
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Ley 40 Horas Chile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { navy: '#0f172a', success: '#16a34a', danger: '#dc2626', premium: '#f59e0b' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <header class="bg-navy text-white py-12 px-4 text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-4">Calculadora Ley 40 Horas Chile</h1>
        <p class="text-lg text-slate-300">Configura tu horario detallado y verifica el cumplimiento de la ley.</p>
    </header>
    <main class="flex-grow p-4">
        <div id="main-calculator" class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-8">
            <form id="calcForm" class="space-y-6" onsubmit="event.preventDefault();">
                <h2 class="text-2xl font-bold text-slate-800">Ingresa el Horario Semanal</h2>
                <div class="overflow-x-auto rounded-lg border border-gray-200">
                    <div class="min-w-full">
                        <div class="grid grid-cols-[80px_60px_1fr_1fr_1fr_2fr] gap-4 items-center px-4 py-3 bg-gray-50">
                            <div class="text-xs font-semibold text-gray-500 uppercase">Día</div>
                            <div class="text-center text-xs font-semibold text-gray-500 uppercase">¿Trabaja?</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Entrada</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Salida</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Colación (Min)</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Horario Colación</div>
                        </div>
                        <div class="divide-y divide-gray-100" id="calculator-days-container"></div>
                    </div>
                </div>
                <div class="mt-8 flex flex-col md:flex-row items-center justify-between gap-6">
                    <div class="w-full md:w-auto order-2 md:order-1">
                        <div id="mensajeAlertaPublico" class="p-4 rounded-lg border text-sm font-medium"></div>
                        <div class="flex items-center gap-4 mt-2">
                           <span class="font-bold text-navy">Total Semanal:</span>
                           <span id="contadorTotalPublico" class="text-3xl font-black text-navy">0.0</span>
                           <span class="text-slate-500">horas</span>
                        </div>
                    </div>
                    <button type="button" id="btn-validar" disabled class="w-full md:w-auto order-1 md:order-2 bg-premium text-white font-bold py-4 px-8 rounded-lg shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">Validar y Obtener PDF ➔</button>
                </div>
            </form>
        </div>
        <div id="precios" class="max-w-5xl mx-auto mt-12 p-8 hidden"></div>
        <div id="auth-section" class="max-w-5xl mx-auto mt-12 p-8 hidden"></div>
        <div id="pdf-form-section" class="max-w-5xl mx-auto mt-12 p-8 hidden">
            <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-8 border-t-4 border-navy">
                <h2 class="text-2xl font-bold text-center text-navy mb-6">Completa los Datos para el Anexo</h2>
                <form id="pdf-form"></form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dias = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
            const calculatorDaysContainer = document.getElementById('calculator-days-container');
            const disabledClasses = ['bg-gray-100', 'opacity-50'];
            let allDayRowsHTML = '';

            dias.forEach(id => {
                allDayRowsHTML += `
                <div class="grid grid-cols-[80px_60px_1fr_1fr_1fr_2fr] gap-4 items-center px-4 py-2 day-row">
                    <div><label for="check-${id}" class="font-semibold">${id.charAt(0).toUpperCase() + id.slice(1)}</label></div>
                    <div class="flex justify-center"><input type="checkbox" id="check-${id}" class="h-5 w-5 rounded border-gray-300 text-blue-600 cursor-pointer"></div>
                    <div><input type="time" id="in-${id}" class="day-input w-full rounded-md border p-1 text-sm bg-gray-100 opacity-50" disabled></div>
                    <div><input type="time" id="out-${id}" class="day-input w-full rounded-md border p-1 text-sm bg-gray-100 opacity-50" disabled></div>
                    <div><input type="number" id="col-${id}" placeholder="Min" class="day-input w-full rounded-md border p-1 text-sm bg-gray-100 opacity-50" disabled></div>
                    <div class="flex items-center gap-2">
                        <input type="time" id="cin-${id}" class="day-input w-full rounded-md border p-1 text-sm bg-gray-100 opacity-50" disabled>
                        <span class="text-gray-400 font-bold">-</span>
                        <input type="time" id="cfn-${id}" class="day-input w-full rounded-md border p-1 text-sm bg-gray-100 opacity-50" readonly disabled>
                    </div>
                </div>
                ${id === 'lunes' ? '<div class="px-4 pb-2 pt-1"><button type="button" id="btn-replicar-lunes" class="text-xs text-blue-600 hover:text-blue-800 font-medium">Replicar Lunes a Viernes</button></div>' : ''}`;
            });
            calculatorDaysContainer.innerHTML = allDayRowsHTML;

            const timeToMinutes = (t) => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };
            
            // 2. LÓGICA DE VALIDACIÓN LEGAL (CHILE)
            const updateAlertsAndButton = () => {
                const total = parseFloat(document.getElementById('contadorTotalPublico').innerText);
                const alertBox = document.getElementById('mensajeAlertaPublico');
                const validarBtn = document.getElementById('btn-validar');
                alertBox.className = 'p-4 rounded-lg border text-sm font-medium'; // Reset classes

                if (total > 42) {
                    alertBox.classList.add('bg-red-50', 'border-danger', 'text-danger');
                    alertBox.innerHTML = "<strong>Atención:</strong> La jornada supera el máximo legal permitido (42 horas).";
                    validarBtn.disabled = true;
                } else if (total >= 30) {
                    alertBox.classList.add('bg-green-50', 'border-success', 'text-success');
                    alertBox.innerHTML = "<strong>¡Correcto!</strong> Cumple con la normativa de Jornada Ordinaria.";
                    validarBtn.disabled = false;
                } else if (total > 0) {
                    alertBox.classList.add('bg-green-50', 'border-success', 'text-success');
                    alertBox.innerHTML = "<strong>¡Correcto!</strong> Jornada Parcial (Part-time).";
                    validarBtn.disabled = false;
                } else {
                    alertBox.classList.add('hidden');
                    validarBtn.disabled = true;
                }
            };

            const calcularTotal = () => {
                let total = 0;
                dias.forEach(dia => {
                    if (document.getElementById(`check-${dia}`).checked) {
                        const hIn = document.getElementById(`in-${dia}`).value, hOut = document.getElementById(`out-${dia}`).value, colM = parseInt(document.getElementById(`col-${dia}`).value) || 0;
                        let mIn = timeToMinutes(hIn), mOut = timeToMinutes(hOut);
                        if (hIn && hOut && mOut <= mIn) mOut += 1440;
                        const hrsEfectivas = (hIn && hOut) ? (mOut - mIn - colM) / 60 : 0;
                        total += hrsEfectivas > 0 ? hrsEfectivas : 0;
                    }
                });
                document.getElementById('contadorTotalPublico').innerText = total.toFixed(1);
                updateAlertsAndButton();
            };

            const calcularFinColacion = (dia) => {
                const duracionInput = document.getElementById(`col-${dia}`), inicioInput = document.getElementById(`cin-${dia}`), finInput = document.getElementById(`cfn-${dia}`);
                if (duracionInput.value && inicioInput.value) {
                    const [h, m] = inicioInput.value.split(':').map(Number);
                    const totalMinutos = h * 60 + m + parseInt(duracionInput.value, 10);
                    finInput.value = `${String(Math.floor(totalMinutos / 60) % 24).padStart(2, '0')}:${String(totalMinutos % 60).padStart(2, '0')}`;
                }
            };

            dias.forEach(id => {
                const checkbox = document.getElementById(`check-${id}`), row = checkbox.closest('.day-row'), inputs = row.querySelectorAll('.day-input');
                checkbox.addEventListener('change', () => {
                    const isChecked = checkbox.checked;
                    inputs.forEach(input => { input.disabled = !isChecked; input.classList.toggle(...disabledClasses, !isChecked); if(!isChecked) input.value = ''; });
                    calcularTotal();
                });
                row.querySelectorAll('input[type="time"], input[type="number"]').forEach(input => input.addEventListener('input', calcularTotal));
                document.getElementById(`col-${id}`).addEventListener('input', () => calcularFinColacion(id));
                document.getElementById(`cin-${id}`).addEventListener('input', () => calcularFinColacion(id));
            });
            
            // 1. CORRECCIÓN DE RÉPLICA
            document.getElementById('btn-replicar-lunes')?.addEventListener('click', () => {
                if (!document.getElementById('check-lunes').checked) { alert('Completa y marca el Lunes para replicar.'); return; }
                const valoresLunes = { in: 'in-lunes', out: 'out-lunes', col: 'col-lunes', cin: 'cin-lunes', cfn: 'cfn-lunes' };
                const diasSemana = ['martes', 'miercoles', 'jueves', 'viernes'];
                diasSemana.forEach(dia => {
                    const checkbox = document.getElementById(`check-${dia}`);
                    if (!checkbox.checked) { checkbox.checked = true; checkbox.dispatchEvent(new Event('change', { bubbles: true })); }
                    for (const key in valoresLunes) {
                        const valorLunes = document.getElementById(valoresLunes[key]).value;
                        document.getElementById(`${key}-${dia}`).value = valorLunes;
                    }
                });
                calcularTotal(); // Actualización inmediata del total
            });

            document.getElementById('btn-validar').addEventListener('click', () => {
                // La validación ahora solo depende del estado del botón, controlado por updateAlertsAndButton
                const scheduleToSave = dias.map(dia => {
                    if (!document.getElementById(`check-${dia}`).checked) return null;
                    return { day: dia.charAt(0).toUpperCase() + dia.slice(1), entry: document.getElementById(`in-${dia}`).value, exit: document.getElementById(`out-${dia}`).value, lunchDuration: document.getElementById(`col-${dia}`).value, lunchEntry: document.getElementById(`cin-${dia}`).value, lunchExit: document.getElementById(`cfn-${dia}`).value };
                }).filter(Boolean);
                localStorage.setItem('anexoSchedule', JSON.stringify(scheduleToSave));
                alert("Horario validado. Procediendo a completar los datos del anexo...");
                document.getElementById('main-calculator').classList.add('hidden');
                document.getElementById('pdf-form-section').classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
