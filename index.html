    <script>
        tailwind.config = {

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

                                <div class="flex items-center gap-2">
                                    <input type="time" id="cin-jueves" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled>
                                    <span class="text-gray-400 font-bold">-</span>
                                    <input type="time" id="cfn-jueves" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled>
                                </div>
                            </div>
                            <!-- Viernes -->

                                <div><label for="check-viernes" class="font-semibold text-gray-800">Viernes</label></div>
                                <div class="flex justify-center"><input type="checkbox" id="check-viernes" class="h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer"></div>
                                <div><input type="time" id="in-viernes" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled></div>
                                <div><input type="time" id="out-viernes" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled></div>
                                <div><input type="number" id="col-viernes" placeholder="Min" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled></div>
                                <div class="flex items-center gap-2">

                            <!-- Sábado -->

                                <div><label for="check-sabado" class="font-semibold text-gray-800">Sábado</label></div>
                                <div class="flex justify-center"><input type="checkbox" id="check-sabado" class="h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer"></div>
                                <div><input type="time" id="in-sabado" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled></div>
                                <div><input type="time" id="out-sabado" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled></div>
                                <div><input type="number" id="col-sabado" placeholder="Min" class="day-input w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-100 text-gray-400 opacity-50" disabled></div>

                <div class="mt-8 flex flex-col md:flex-row items-center justify-between gap-6">
                    <div class="w-full md:w-auto order-2 md:order-1">
                        <div id="mensajeAlertaPublico" class="p-4 rounded-lg border hidden"></div>
                        <div class="flex items-center gap-4 mt-2">
                           <span class="font-bold text-navy">Total Semanal:</span>
                           <span id="contadorTotalPublico" class="text-3xl font-black text-navy">0.0</span>
                           <span class="text-slate-500">horas</span>
                        </div>
                    </div>
                    <button type="submit" id="btn-validar" class="w-full md:w-auto order-1 md:order-2 bg-premium text-white font-bold py-4 px-8 rounded-lg shadow-lg hover:bg-opacity-90 focus:outline-none focus:ring-4 focus:ring-amber-300 transition-all duration-300">Validar Turno y Obtener Anexo PDF ➔</button>
                </div>
            </form>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dias = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
            const disabledClasses = ['bg-gray-100', 'text-gray-400', 'opacity-50'];

            dias.forEach(id => {
                const checkbox = document.getElementById(`check-${id}`);
                const row = checkbox.closest('.day-row');
                const inputs = row.querySelectorAll('.day-input');

                checkbox.addEventListener('change', () => {
                    const isChecked = checkbox.checked;
                    inputs.forEach(input => {
                        input.disabled = !isChecked;
                        if (isChecked) {
                            input.classList.remove(...disabledClasses);
                        } else {
                            input.classList.add(...disabledClasses);
                        }
                    });
                    calcular();
                });
                
                inputs.forEach(input => input.addEventListener('input', calcular));
            });
            
            document.getElementById('calcForm').addEventListener('submit', (e) => {
                e.preventDefault();
                calcular();
            });
        });

        function timeToMinutes(t) {
            if (!t) return 0;
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }

        function calcular() {
            let total = 0, diasActivos = 0, error10 = false;
            const diasIds = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
            
            diasIds.forEach(dia => {
                if (document.getElementById(`check-${dia}`).checked) {
                    diasActivos++;
                    const hIn = document.getElementById(`in-${dia}`).value;
                    const hOut = document.getElementById(`out-${dia}`).value;
                    const colM = parseInt(document.getElementById(`col-${dia}`).value) || 0;
                    let mIn = timeToMinutes(hIn), mOut = timeToMinutes(hOut);
                    if (hIn && hOut && mOut <= mIn) mOut += 1440; // Overnight shift
                    const hrsEfectivas = (hIn && hOut) ? (mOut - mIn - colM) / 60 : 0;
                    if (hrsEfectivas > 10) error10 = true;
                    total += hrsEfectivas > 0 ? hrsEfectivas : 0;
                }
            });

            document.getElementById('contadorTotalPublico').innerText = total.toFixed(1);
            const alertBox = document.getElementById('mensajeAlertaPublico');
            
            if (diasActivos > 0 && total <= 42 && !error10 && (total <= 30 || (diasActivos >= 4 && diasActivos <= 6))) {
                alertBox.className = "p-4 rounded-lg border mt-4 bg-green-50 border-success text-success";
                alertBox.innerHTML = "<strong>¡Perfecto!</strong> Tu horario cumple con la ley vigente.";
                alertBox.classList.remove('hidden');
            } else {
                 alertBox.classList.remove('hidden');
                 alertBox.className = "p-4 rounded-lg border mt-4 bg-red-50 border-danger text-danger";
                 if (diasActivos === 0) {
                    alertBox.innerHTML = "<strong>Error:</strong> Selecciona al menos un día.";
                 } else if (error10) {
                    alertBox.innerHTML = "<strong>Tope Diario:</strong> Máximo 10 hrs efectivas por día.";
                 } else if (total > 42) {
                    alertBox.innerHTML = "<strong>Exceso Semanal:</strong> Máximo 42 horas semanales.";
                 } else if (total > 30 && (diasActivos < 4 || diasActivos > 6)) {
                    alertBox.innerHTML = "<strong>Distribución:</strong> Jornada ordinaria debe ser entre 4 y 6 días.";
                 } else {
                     alertBox.classList.add('hidden');
                 }
            }
        }
    </script>

</html>
