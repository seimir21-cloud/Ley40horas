
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Ley 40 Horas Chile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { navy: '#0f172a', success: '#16a34a', danger: '#dc2626', premium: '#f59e0b' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <header class="bg-navy text-white py-12 px-4 text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-4">Calculadora Ley 40 Horas Chile</h1>
        <p class="text-lg text-slate-300">Configura tu horario detallado y verifica el cumplimiento de la ley.</p>
    </header>
    <main class="flex-grow p-4">
        <div id="main-calculator" class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-8">
            <form id="calcForm" class="space-y-6" onsubmit="event.preventDefault();">
                <h2 class="text-2xl font-bold text-slate-800">Ingresa el Horario Semanal</h2>
                <div class="overflow-x-auto rounded-lg border border-gray-200">
                    <div class="min-w-full">
                        <div class="grid grid-cols-[80px_60px_1fr_1fr_1fr_2fr] gap-4 items-center px-4 py-3 bg-gray-50">
                            <div class="text-xs font-semibold text-gray-500 uppercase">Día</div>
                            <div class="text-center text-xs font-semibold text-gray-500 uppercase">¿Trabaja?</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Entrada</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Salida</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Colación (Min)</div>
                            <div class="text-xs font-semibold text-gray-500 uppercase">Horario Colación</div>
                        </div>
                        <div class="divide-y divide-gray-100" id="calculator-days-container"></div>
                    </div>
                </div>
                <div class="mt-8 flex flex-col md:flex-row items-center justify-between gap-6">
                    <div class="w-full md:w-auto order-2 md:order-1">
                        <div id="mensajeAlertaPublico" class="p-4 rounded-lg border hidden"></div>
                        <div class="flex items-center gap-4 mt-2">
                           <span class="font-bold text-navy">Total Semanal:</span>
                           <span id="contadorTotalPublico" class="text-3xl font-black text-navy">0.0</span>
                           <span class="text-slate-500">horas</span>
                        </div>
                    </div>
                    <button type="button" id="btn-validar" class="w-full md:w-auto order-1 md:order-2 bg-premium text-white font-bold py-4 px-8 rounded-lg shadow-lg">Validar y Obtener PDF ➔</button>
                </div>
            </form>
        </div>
        <div id="precios" class="max-w-5xl mx-auto mt-12 p-8 hidden"></div>
        <div id="auth-section" class="max-w-5xl mx-auto mt-12 p-8 hidden"></div>
        <div id="pdf-form-section" class="max-w-5xl mx-auto mt-12 p-8 hidden">
            <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-8 border-t-4 border-navy">
                <h2 class="text-2xl font-bold text-center text-navy mb-6">Completa los Datos para el Anexo</h2>
                <form id="pdf-form"></form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dias = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
            const calculatorDaysContainer = document.getElementById('calculator-days-container');
            const disabledClasses = ['bg-gray-100', 'opacity-50'];
            let allDayRowsHTML = '';

            dias.forEach(id => {
                allDayRowsHTML += `
                <div class="grid grid-cols-[80px_60px_1fr_1fr_1fr_2fr] gap-4 items-center px-4 py-2 day-row">
                    <div><label for="check-${id}">${id.charAt(0).toUpperCase() + id.slice(1)}</label></div>
                    <div class="flex justify-center"><input type="checkbox" id="check-${id}" class="h-5 w-5 rounded border-gray-300 text-blue-600"></div>
                    <div><input type="time" id="in-${id}" class="day-input w-full rounded-md border p-1 text-sm" disabled></div>
                    <div><input type="time" id="out-${id}" class="day-input w-full rounded-md border p-1 text-sm" disabled></div>
                    <div><input type="number" id="col-${id}" placeholder="Min" class="day-input w-full rounded-md border p-1 text-sm" disabled></div>
                    <div class="flex items-center gap-2">
                        <input type="time" id="cin-${id}" class="day-input w-full rounded-md border p-1 text-sm" disabled>
                        <span class="text-gray-400 font-bold">-</span>
                        <input type="time" id="cfn-${id}" class="day-input w-full rounded-md border p-1 text-sm" readonly disabled>
                    </div>
                </div>
                ${id === 'lunes' ? '<div class="px-4 pb-2 pt-1"><button type="button" id="btn-replicar-lunes" class="text-xs text-blue-600">Replicar Lunes a Viernes</button></div>' : ''}`;
            });
            calculatorDaysContainer.innerHTML = allDayRowsHTML;

            const timeToMinutes = (t) => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };
            
            const updateAlerts = () => {
                const total = parseFloat(document.getElementById('contadorTotalPublico').innerText);
                const alertBox = document.getElementById('mensajeAlertaPublico');
                alertBox.classList.remove('hidden', 'bg-red-50', 'border-danger', 'text-danger', 'bg-green-50', 'border-success', 'text-success', 'bg-amber-50', 'border-premium', 'text-amber-800');

                if (total > 42) {
                    alertBox.classList.add('bg-amber-50', 'border-premium', 'text-amber-800');
                    alertBox.innerHTML = "<strong>Advertencia:</strong> Este horario supera el límite legal vigente de 42 horas.";
                } else if (total > 0 && total <= 40) {
                    alertBox.classList.add('bg-green-50', 'border-success', 'text-success');
                    alertBox.innerHTML = "<strong>¡Correcto!</strong> El horario cumple la normativa.";
                } else {
                    alertBox.classList.add('hidden');
                }
            };

            const calcularTotal = () => {
                let total = 0;
                dias.forEach(dia => {
                    if (document.getElementById(`check-${dia}`).checked) {
                        const hIn = document.getElementById(`in-${dia}`).value, hOut = document.getElementById(`out-${dia}`).value, colM = parseInt(document.getElementById(`col-${dia}`).value) || 0;
                        let mIn = timeToMinutes(hIn), mOut = timeToMinutes(hOut);
                        if (hIn && hOut && mOut <= mIn) mOut += 1440;
                        const hrsEfectivas = (hIn && hOut) ? (mOut - mIn - colM) / 60 : 0;
                        total += hrsEfectivas > 0 ? hrsEfectivas : 0;
                    }
                });
                document.getElementById('contadorTotalPublico').innerText = total.toFixed(1);
                updateAlerts(); // Actualizar las alertas después de cada cálculo
            };

            const calcularFinColacion = (dia) => {
                const duracionInput = document.getElementById(`col-${dia}`), inicioInput = document.getElementById(`cin-${dia}`), finInput = document.getElementById(`cfn-${dia}`);
                const duracionMins = parseInt(duracionInput.value, 10);
                const horaInicio = inicioInput.value;
                if (!isNaN(duracionMins) && horaInicio) {
                    const [horas, minutos] = horaInicio.split(':').map(Number);
                    const fechaFin = new Date(new Date().setHours(horas, minutos) + duracionMins * 60000);
                    finInput.value = `${String(fechaFin.getHours()).padStart(2, '0')}:${String(fechaFin.getMinutes()).padStart(2, '0')}`;
                } else {
                    finInput.value = '';
                }
            };

            dias.forEach(id => {
                const checkbox = document.getElementById(`check-${id}`), row = checkbox.closest('.day-row'), inputs = row.querySelectorAll('.day-input');
                checkbox.addEventListener('change', () => {
                    const isChecked = checkbox.checked;
                    inputs.forEach(input => {
                        input.disabled = !isChecked; input.classList.toggle(...disabledClasses, !isChecked);
                        if(!isChecked) input.value = '';
                    });
                    calcularTotal();
                });
                inputs.forEach(input => input.addEventListener('input', calcularTotal));
                document.getElementById(`col-${id}`).addEventListener('input', () => calcularFinColacion(id));
                document.getElementById(`cin-${id}`).addEventListener('input', () => calcularFinColacion(id));
            });
            
            document.getElementById('btn-replicar-lunes')?.addEventListener('click', () => {
                if (!document.getElementById('check-lunes').checked) { alert('Completa y marca el Lunes para replicar.'); return; }
                const valoresLunes = { entrada: document.getElementById('in-lunes').value, salida: document.getElementById('out-lunes').value, colacionMin: document.getElementById('col-lunes').value, colacionInicio: document.getElementById('cin-lunes').value, colacionFin: document.getElementById('cfn-lunes').value };
                const diasSemana = ['martes', 'miercoles', 'jueves', 'viernes'], inputEvent = new Event('input', { bubbles: true }), changeEvent = new Event('change', { bubbles: true });
                diasSemana.forEach(dia => {
                    const checkbox = document.getElementById(`check-${dia}`);
                    if (!checkbox.checked) { checkbox.checked = true; checkbox.dispatchEvent(changeEvent); }
                    Object.keys(valoresLunes).forEach(key => { 
                        const idMap = { entrada: `in-${dia}`, salida: `out-${dia}`, colacionMin: `col-${dia}`, colacionInicio: `cin-${dia}`, colacionFin: `cfn-${dia}` };
                        document.getElementById(idMap[key]).value = valoresLunes[key];
                    });
                    row.querySelectorAll('.day-input').forEach(i => i.dispatchEvent(inputEvent));
                });
                calcularTotal();
            });

            // Lógica de validación NO BLOQUEANTE
            document.getElementById('btn-validar').addEventListener('click', () => {
                calcularTotal(); // Asegura que el cálculo esté al día
                const scheduleToSave = dias.map(dia => {
                    if (!document.getElementById(`check-${dia}`).checked) return null;
                    return { day: dia.charAt(0).toUpperCase() + dia.slice(1), entry: document.getElementById(`in-${dia}`).value || 'N/A', exit: document.getElementById(`out-${dia}`).value || 'N/A', lunchDuration: document.getElementById(`col-${dia}`).value || '0', lunchEntry: document.getElementById(`cin-${dia}`).value || 'N/A', lunchExit: document.getElementById(`cfn-${dia}`).value || 'N/A', };
                }).filter(Boolean);
                if (scheduleToSave.length === 0) { alert("Debes definir un horario para al menos un día."); return; }

                localStorage.setItem('anexoSchedule', JSON.stringify(scheduleToSave));
                // Aquí iría la lógica para mostrar la siguiente sección (precios, auth, etc.)
                // Por ejemplo: document.getElementById('precios').classList.remove('hidden');
                alert("Horario validado y guardado. Procediendo al siguiente paso...");
            });

            // La validación del formulario final (nombre, rut, etc.) ya se maneja por separado 
            // y correctamente habilita/deshabilita el botón "Generar PDF" final.
        });
    </script>
</body>
</html>
